spring:
  application:
    name: cooperative-management-system
  
  profiles:
    active: dev
  
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    ignore-missing-migrations: true
    
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-minimum-256-bits}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# Document storage — MinIO (self-hosted S3-compatible object storage)
app:
  document:
    storage:
      # MinIO server URL (e.g. http://localhost:9000 or https://minio.yourdomain.com)
      minio-endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      # Bucket name — must exist in MinIO before starting the app
      minio-bucket: ${MINIO_BUCKET:coop-documents}
      # MinIO access credentials (set via environment variables in production)
      minio-access-key: ${MINIO_ACCESS_KEY:coopAdmin}
      minio-secret-key: ${MINIO_SECRET_KEY:coopSecret123}
      # Presigned URL expiry in minutes (default 30 minutes)
      presigned-url-expiry-minutes: ${MINIO_PRESIGNED_EXPIRY_MINUTES:30}
      # Max file size in bytes (default 10 MB)
      max-size-bytes: ${DOCUMENT_MAX_SIZE_BYTES:10485760}

# Logging Configuration
logging:
  level:
    root: INFO
    et.edu.woldia.coop: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cooperative-management-system.log
    max-size: 10MB
    max-history: 30

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5432/cooperative_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  flyway:
    enabled: false  # Temporarily disable Flyway
  
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none  # Schema managed manually via SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    et.edu.woldia.coop: DEBUG

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:postgresql://localhost:5432/cooperative_db_test
    username: postgres
    password: postgres
  
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    et.edu.woldia.coop: INFO
  file:
    name: /var/log/cooperative-management-system/application.log
